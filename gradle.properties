# Project-wide Gradle settings.
# Termux optimized configuration - AAPT2 daemon disabled
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseParallelGC -Dfile.encoding=UTF-8
org.gradle.daemon=false
org.gradle.parallel=false
org.gradle.caching=false
org.gradle.workers.max=1
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# Disable AAPT2 daemon completely for Termux
android.enableAapt2Daemon=false
android.enableAapt2JvmDaemon=false
android.aapt2FromMavenOverride=
# Use legacy resource processing
android.enableIncrementalResourceProcessing=false
